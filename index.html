<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIDLOCK</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: pointer; }
    canvas { display: block; position: absolute; top: 0; left: 0; }
    #title {
      position: absolute; top: 38px; width: 100%; text-align: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 64px; letter-spacing: 18px;
      color: #fff; text-shadow: 0 0 30px rgba(80,200,255,0.7), 0 0 80px rgba(0,140,255,0.4);
      pointer-events: none; animation: floatTitle 4s ease-in-out infinite; z-index: 20;
    }
    @keyframes floatTitle {
      0%,100% { transform: translateY(0px);   text-shadow: 0 0 30px rgba(80,200,255,0.7), 0 0 80px rgba(0,140,255,0.4); }
      50%      { transform: translateY(-10px); text-shadow: 0 0 50px rgba(80,220,255,1),   0 0 120px rgba(0,160,255,0.6); }
    }
    #hint {
      position: absolute; bottom: 36px; width: 100%; text-align: center;
      font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 4px;
      color: rgba(80,200,255,0.4); text-transform: uppercase; pointer-events: none;
      z-index: 20; transition: opacity 0.6s;
    }
    #hint.hidden { opacity: 0; }
    #audio-status {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px;
      color: rgba(80,200,255,0.55); text-transform: uppercase; pointer-events: none;
      z-index: 20; display: flex; align-items: center; gap: 8px; opacity: 0; transition: opacity 0.5s;
    }
    #audio-status.visible { opacity: 1; }
    #status-dot {
      width: 6px; height: 6px; border-radius: 50%; background: rgba(80,200,255,0.4);
      transition: background 0.3s, box-shadow 0.3s;
    }
    #status-dot.playing {
      background: rgba(80,200,255,1); box-shadow: 0 0 8px rgba(80,200,255,0.8);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { box-shadow: 0 0 4px rgba(80,200,255,0.5); }
      50%      { box-shadow: 0 0 14px rgba(80,200,255,1); }
    }
    #center-image {
      position: absolute; top: 50%; left: 50%; width: 180px; height: 180px;
      z-index: 15; display: flex; align-items: center; justify-content: center;
      animation: imgFloat 5s ease-in-out infinite; pointer-events: none;
    }
    #center-image img {
      max-width: 100%; max-height: 100%; object-fit: contain; display: block;
      filter: drop-shadow(0 0 18px rgba(80,200,255,0.8)) drop-shadow(0 0 40px rgba(0,140,255,0.4));
      mix-blend-mode: screen;
    }
    @keyframes imgFloat {
      0%,100% { transform: translate(-50%,-50%) translateY(0px); }
      50%      { transform: translate(-50%,-50%) translateY(-12px); }
    }
  </style>
</head>
<body>
  <div id="title">GRIDLOCK</div>
  <canvas id="c"></canvas>

  <div id="center-image">
    <img src="Jabber.png" alt="subject">
  </div>

  <div id="hint">[ click anywhere to play ]</div>
  <div id="audio-status">
    <span id="status-dot"></span>
    <span id="status-txt">playing</span>
  </div>

  <audio id="audio" preload="metadata" loop>
    <source src="sixieme.mp3" type="audio/mpeg">
  </audio>

  <script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const SPHERE_R = 220, NODE_COUNT = 72, LINE_COUNT = 120;
  let rot = 0;

  function sph(lat, lon) {
    return { x: SPHERE_R*Math.cos(lat)*Math.cos(lon), y: SPHERE_R*Math.sin(lat), z: SPHERE_R*Math.cos(lat)*Math.sin(lon) };
  }
  const nodes = Array.from({length: NODE_COUNT}, () => ({ lat: (Math.random()-0.5)*Math.PI, baseLon: Math.random()*2*Math.PI }));
  const lines  = Array.from({length: LINE_COUNT}, () => {
    const a = nodes[Math.floor(Math.random()*nodes.length)];
    const b = nodes[Math.floor(Math.random()*nodes.length)];
    const dir = Math.random() < 0.5 ? 1 : -1;
    return { node: dir>0?a:b, target: dir>0?b:a, ext: 100+Math.random()*280, progress: Math.random(), speed: 0.002+Math.random()*0.006, alpha: 0.4+Math.random()*0.6, color: Math.random()<0.5?[80,200,255]:[0,120,255] };
  });

  function project(x,y,z,cx,cy) { const d=600/(600+z+300); return {px:cx+x*d, py:cy+y*d}; }
  function rotX(p,a) { return {x:p.x, y:p.y*Math.cos(a)-p.z*Math.sin(a), z:p.y*Math.sin(a)+p.z*Math.cos(a)}; }
  function gp(n) { return rotX(sph(n.lat, n.baseLon+rot), 0.3); }

  function draw() {
    const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2+20;
    ctx.clearRect(0,0,W,H);
    const g = ctx.createRadialGradient(cx,cy,0,cx,cy,SPHERE_R*2);
    g.addColorStop(0,'rgba(0,30,60,0.22)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(40,120,200,0.18)'; ctx.lineWidth=0.7;
    for(let i=0;i<=10;i++){
      const lat=-Math.PI/2+Math.PI*i/10; ctx.beginPath();
      for(let j=0;j<=80;j++){
        let p=rotX(sph(lat,2*Math.PI*j/80+rot),0.3);
        if(p.z+300<0) continue;
        const pr=project(p.x,p.y,p.z,cx,cy);
        j===0 ? ctx.moveTo(pr.px,pr.py) : ctx.lineTo(pr.px,pr.py);
      }
      ctx.stroke();
    }
    for(let i=0;i<16;i++){
      const lon=2*Math.PI*i/16+rot; ctx.beginPath();
      for(let j=0;j<=60;j++){
        let p=rotX(sph(-Math.PI/2+Math.PI*j/60,lon),0.3);
        if(p.z+300<80) continue;
        const pr=project(p.x,p.y,p.z,cx,cy);
        j===0 ? ctx.moveTo(pr.px,pr.py) : ctx.lineTo(pr.px,pr.py);
      }
      ctx.stroke();
    }
    lines.forEach(l => {
      l.progress += l.speed;
      if(l.progress > 1) l.progress = 0;
      const np=gp(l.node), tp=gp(l.target);
      const p0=project(np.x,np.y,np.z,cx,cy), p1=project(tp.x,tp.y,tp.z,cx,cy);
      const dx=p1.px-p0.px, dy=p1.py-p0.py, len=Math.sqrt(dx*dx+dy*dy)||1;
      const ox=p0.px+(dx/len)*l.ext, oy=p0.py+(dy/len)*l.ext;
      const [r,gb,b]=l.color;
      const grd=ctx.createLinearGradient(p0.px,p0.py,ox,oy);
      grd.addColorStop(0,`rgba(${r},${gb},${b},0)`);
      grd.addColorStop(0.3,`rgba(${r},${gb},${b},${l.alpha*0.6})`);
      grd.addColorStop(1,`rgba(${r},${gb},${b},0)`);
      ctx.strokeStyle=grd; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(p0.px,p0.py); ctx.lineTo(ox,oy); ctx.stroke();
      const tx=p0.px+(ox-p0.px)*l.progress, ty=p0.py+(oy-p0.py)*l.progress;
      ctx.beginPath(); ctx.arc(tx,ty,3,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${gb},${b},${l.alpha})`; ctx.fill();
    });
    nodes.forEach(n => {
      const p=gp(n); if(p.z+300<30) return;
      const pr=project(p.x,p.y,p.z,cx,cy), vis=Math.min(1,(p.z+300)/350);
      ctx.beginPath(); ctx.arc(pr.px,pr.py,3.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(80,200,255,${0.8*vis})`; ctx.fill();
      ctx.beginPath(); ctx.arc(pr.px,pr.py,8,0,Math.PI*2);
      ctx.fillStyle=`rgba(80,200,255,${0.12*vis})`; ctx.fill();
    });
    const sg=ctx.createRadialGradient(cx-50,cy-50,20,cx,cy,SPHERE_R);
    sg.addColorStop(0,'rgba(60,160,255,0.07)'); sg.addColorStop(0.6,'rgba(20,80,180,0.04)'); sg.addColorStop(1,'rgba(0,20,80,0.14)');
    ctx.beginPath(); ctx.arc(cx,cy,SPHERE_R,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();
    rot += 0.004;
    requestAnimationFrame(draw);
  }
  draw();

  const audio      = document.getElementById('audio');
  const hint       = document.getElementById('hint');
  const statusWrap = document.getElementById('audio-status');
  const statusDot  = document.getElementById('status-dot');
  const statusTxt  = document.getElementById('status-txt');
  let started = false;
  function setPlaying(on) {
    statusDot.className = on ? 'playing' : '';
    statusTxt.textContent = on ? 'playing' : 'paused';
  }
  document.addEventListener('click', () => {
    if (!started) {
      hint.classList.add('hidden');
      setTimeout(() => { hint.style.display = 'none'; }, 600);
      statusWrap.classList.add('visible');
      started = true;
    }
    if (audio.paused) { audio.play().catch(() => {}); } else { audio.pause(); }
  });
  audio.addEventListener('play',  () => setPlaying(true));
  audio.addEventListener('pause', () => setPlaying(false));
  audio.addEventListener('ended', () => setPlaying(false));
  </script>
</body>
</html>
